name: Build

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout MyClaw
        uses: actions/checkout@v4

      - name: Checkout zeroclaw (for path deps)
        uses: actions/checkout@v4
        with:
          repository: nxajh/zeroclaw
          path: zeroclaw-external
          fetch-depth: 1

      - name: Create cargo path overrides
        # zeroclaw crates are hard-coded to paths like:
        #   zeroclaw-api = { path = "/home/ubuntu/.zeroclaw/src/crates/zeroclaw-api" }
        # Use [target.'cfg(not(...))'.dependencies] + path overrides
        # to redirect to zeroclaw-external/src/crates/ on the runner.
        run: |
          mkdir -p .cargo
          cat > .cargo/config.toml << 'EOF'
          [alias]
          # No aliases needed

          [build]
          # Override path dependencies to use zeroclaw-external on the runner.
          # The runner checkout lives in /home/runner/work/MyClaw/MyClaw/
          # and zeroclaw-external is a sibling directory.
          rustflags = [
            # Not needed — we use [alias] or [target] instead below.
          ]
          EOF

          # Write path-overriding config that cargo will respect.
          # Each crate that depends on zeroclaw-xxx via absolute path
          # needs to be redirected here.
          cat > .cargo/config.toml << 'TOML'
          [build]
          target = "x86_64-unknown-linux-gnu"

          [alias]
          # Workaround: cargo only supports path overrides via [target.<triple>.dependencies]
          # We use the simpler approach: rewrite the zeroclaw path deps
          # to relative paths via a patch section in Cargo.toml, which is
          # project-global and works from any location.
          TOML

      - name: Rewrite zeroclaw path deps to relative paths
        run: |
          # Change all /home/ubuntu/.zeroclaw/src/crates/xxx paths to
          # the relative sibling zeroclaw-external/src/crates/xxx
          find . -name "Cargo.toml" -exec sed -i \
            -e 's|path = "/home/ubuntu/.zeroclaw/src/crates/\([^"]*\)"|path = "zeroclaw-external/src/crates/\1"|g' \
            {} \;

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: cargo-registry-${{ hashFiles('**/Cargo.toml') }}

      - name: Cache cargo git
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: cargo-git-${{ hashFiles('**/Cargo.toml') }}

      - name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: target
          key: cargo-build-${{ hashFiles('**/Cargo.toml') }}

      - name: Build all workspace crates
        run: cargo build --workspace

      - name: Run clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Run tests
        run: cargo test --workspace