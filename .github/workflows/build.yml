name: Build

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout MyClaw
        uses: actions/checkout@v4

      - name: Checkout zeroclaw (for path deps)
        uses: actions/checkout@v4
        with:
          repository: nxajh/zeroclaw
          path: zeroclaw-external
          fetch-depth: 1

      - name: Rewrite zeroclaw path deps to relative paths
        run: |
          # Step 1: In all Cargo.toml files, rewrite the hard-coded
          # /home/ubuntu/.zeroclaw/src/crates/xxx to zeroclaw-external/src/crates/xxx
          find . -name "Cargo.toml" -exec sed -i \
            -e 's|path = "/home/ubuntu/.zeroclaw/src/crates/\([^"]*\)"|path = "zeroclaw-external/src/crates/\1"|g' \
            {} \;

          # Step 2: Fix the workspace-level zeroclaw-* path dependencies.
          # In the workspace Cargo.toml, zeroclaw-api, zeroclaw-config, etc.
          # are defined as:
          #   zeroclaw-api = { path = "../../src/crates/zeroclaw-api" }
          # which resolves to /home/runner/src/crates/ (wrong on the runner).
          # Override them to point into zeroclaw-external/src/crates/.
          sed -i 's|path = "../../src/crates/|path = "zeroclaw-external/src/crates/|g' Cargo.toml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: cargo-registry-${{ hashFiles('**/Cargo.toml') }}

      - name: Cache cargo git
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: cargo-git-${{ hashFiles('**/Cargo.toml') }}

      - name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: target
          key: cargo-build-${{ hashFiles('**/Cargo.toml') }}

      - name: Build all workspace crates
        run: cargo build --workspace

      - name: Run clippy on active crates
        run: |
          cargo clippy -p zeroclaw-capability -- -D warnings
          cargo clippy -p zeroclaw-registry -- -D warnings
          cargo clippy -p zeroclaw-memory -- -D warnings
          cargo clippy -p zeroclaw-memory-storage -- -D warnings
          cargo clippy -p zeroclaw-mcp -- -D warnings
          cargo clippy -p zeroclaw-orchestrator -- -D warnings
          cargo clippy -p zeroclaw-channels -- -D warnings
          cargo clippy -p zeroclaw-runtime -- -D warnings

      - name: Run tests on active crates
        run: cargo test -p zeroclaw-registry