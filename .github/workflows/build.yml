name: Build

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    # Run as non-root user on GitHub Actions
    # We create the same home path as the local dev environment.
    
    steps:
      - name: Checkout MyClaw
        uses: actions/checkout@v4

      - name: Checkout zeroclaw (for path deps)
        uses: actions/checkout@v4
        with:
          repository: nxajh/zeroclaw
          path: zeroclaw-external
          fetch-depth: 1

      - name: Mirror zeroclaw to /home/ubuntu path
        # zeroclaw-registry/Cargo.toml has hard-coded paths:
        #   zeroclaw-api = { path = "/home/ubuntu/.zeroclaw/src/crates/zeroclaw-api" }
        # Create the same path structure on the runner.
        run: |
          mkdir -p /home/ubuntu/.zeroclaw/src
          cp -r zeroclaw-external/src/crates /home/ubuntu/.zeroclaw/src/

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: cargo-registry-${{ hashFiles('**/Cargo.toml') }}

      - name: Cache cargo git
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: cargo-git-${{ hashFiles('**/Cargo.toml') }}

      - name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: target
          key: cargo-build-${{ hashFiles('**/Cargo.toml') }}

      - name: Build all workspace crates
        run: cargo build --workspace

      - name: Run clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Run tests
        run: cargo test --workspace