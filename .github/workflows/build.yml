name: Build

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout zeroclaw (full repo)
        uses: actions/checkout@v4
        with:
          repository: nxajh/zeroclaw
          path: zeroclaw
          fetch-depth: 1

      - name: Checkout MyClaw
        uses: actions/checkout@v4
        with:
          path: myclaw
          fetch-depth: 0

      - name: Fix path deps in MyClaw workspace
        run: |
          # Directory layout on runner:
          #   /home/runner/work/MyClaw/zeroclaw/  <- zeroclaw repo root
          #   /home/runner/work/MyClaw/MyClaw/    <- GitHub Actions default workspace
          #   /home/runner/work/MyClaw/MyClaw/myclaw/ <- MyClaw workspace root
          #
          # zeroclaw repo structure: zeroclaw/crates/ (not src/crates/)
          # So paths that point to zeroclaw/src/crates/xxx are WRONG.
          #
          # Fix all zeroclaw path deps to use ../../zeroclaw/crates/xxx
          # This is relative to myclaw/ and correctly points to zeroclaw/crates/xxx

          cd myclaw

          find . -name "Cargo.toml" -exec sed -i \
            -e 's|path = "/home/ubuntu/.zeroclaw/src/crates/\([^"]*\)"|path = "../../zeroclaw/crates/\1"|g' \
            -e 's|path = "../../src/crates/\([^"]*\)"|path = "../../zeroclaw/crates/\1"|g' \
            {} \;

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: cargo-registry-${{ hashFiles('**/Cargo.toml') }}

      - name: Cache cargo git
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: cargo-git-${{ hashFiles('**/Cargo.toml') }}

      - name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: target
          key: cargo-build-${{ hashFiles('**/Cargo.toml') }}

      - name: Build all workspace crates
        run: cargo build --workspace
        working-directory: myclaw

      - name: Run clippy on active crates
        run: cargo clippy --workspace -- -D warnings
        working-directory: myclaw

      - name: Run tests on active crates
        run: cargo test -p zeroclaw-registry
        working-directory: myclaw