name: Build

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout zeroclaw (full repo, before MyClaw)
        uses: actions/checkout@v4
        with:
          repository: nxajh/zeroclaw
          path: zeroclaw
          fetch-depth: 1

      - name: Checkout MyClaw
        uses: actions/checkout@v4
        with:
          path: zeroclaw/MyClaw
          fetch-depth: 0

      - name: Rewrite zeroclaw path deps in MyClaw workspace
        run: |
          cd zeroclaw/MyClaw
          # Replace /home/ubuntu/.zeroclaw/src/crates/xxx → ../src/crates/xxx
          # After checkout, zeroclaw repo root is zeroclaw/ and MyClaw is zeroclaw/MyClaw/
          find . -name "Cargo.toml" -exec sed -i \
            -e 's|path = "/home/ubuntu/.zeroclaw/src/crates/\([^"]*\)"|path = "../../src/crates/\1"|g' \
            {} \;
          # Fix workspace-level zeroclaw-* deps too
          sed -i 's|path = "../../src/crates/|path = "../src/crates/|g' Cargo.toml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: cargo-registry-${{ hashFiles('**/Cargo.toml') }}

      - name: Cache cargo git
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: cargo-git-${{ hashFiles('**/Cargo.toml') }}

      - name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: target
          key: cargo-build-${{ hashFiles('**/Cargo.toml') }}

      - name: Build all workspace crates
        run: cargo build --workspace
        working-directory: zeroclaw/MyClaw

      - name: Run clippy on active crates
        run: cargo clippy --workspace -- -D warnings
        working-directory: zeroclaw/MyClaw

      - name: Run tests on active crates
        run: cargo test -p zeroclaw-registry
        working-directory: zeroclaw/MyClaw