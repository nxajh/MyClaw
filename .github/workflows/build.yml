name: Build

on:
  push:
    branches: [master, refactor/*]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout MyClaw
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Ensure clippy
        run: rustup component add clippy

      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Check
        run: cargo check --features wechat

      - name: Clippy
        run: cargo clippy --features wechat -- -D warnings

      - name: Test
        run: cargo test --features wechat

      - name: Build Release
        run: cargo build --release --features wechat

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: myclaw-linux-x86_64
          path: target/release/myclaw
          retention-days: 7
