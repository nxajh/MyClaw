name: Build

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout zeroclaw (full repo)
        uses: actions/checkout@v4
        with:
          repository: nxajh/zeroclaw
          path: zeroclaw
          fetch-depth: 1

      - name: Checkout MyClaw
        uses: actions/checkout@v4
        with:
          path: myclaw
          fetch-depth: 0

      - name: Fix path deps in MyClaw workspace
        run: |
          # Directory layout on runner:
          #   zeroclaw/                  <- zeroclaw repo root (contains src/crates/)
          #   myclaw/                    <- MyClaw workspace root
          #
          # MyClaw's Cargo.toml workspace root has:
          #   zeroclaw-api = { path = "../../src/crates/zeroclaw-api" }
          # From myclaw/, "../../src/crates/" → zeroclaw/src/crates/ ✓
          # So the workspace-level paths are already correct!
          #
          # But member crates (domain/zeroclaw-capability, infrastructure/zeroclaw-registry)
          # have their own zeroclaw-* path deps like:
          #   zeroclaw-api = { path = "/home/ubuntu/.zeroclaw/src/crates/zeroclaw-api" }
          # These hard-coded /home/ubuntu paths don't exist on the runner.
          # Fix only the hard-coded /home/ubuntu paths.
          cd myclaw

          find . -name "Cargo.toml" -exec sed -i \
            's|path = "/home/ubuntu/.zeroclaw/src/crates/\([^"]*\)"|path = "../zeroclaw/src/crates/\1"|g' \
            {} \;

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: cargo-registry-${{ hashFiles('**/Cargo.toml') }}

      - name: Cache cargo git
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: cargo-git-${{ hashFiles('**/Cargo.toml') }}

      - name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: target
          key: cargo-build-${{ hashFiles('**/Cargo.toml') }}

      - name: Build all workspace crates
        run: cargo build --workspace
        working-directory: myclaw

      - name: Run clippy on active crates
        run: cargo clippy --workspace -- -D warnings
        working-directory: myclaw

      - name: Run tests on active crates
        run: cargo test -p zeroclaw-registry
        working-directory: myclaw