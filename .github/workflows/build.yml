name: Build

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout zeroclaw (full repo)
        uses: actions/checkout@v4
        with:
          repository: nxajh/zeroclaw
          path: zeroclaw
          fetch-depth: 1

      - name: Checkout MyClaw
        uses: actions/checkout@v4
        with:
          path: myclaw
          fetch-depth: 0

      - name: Fix path deps in MyClaw workspace
        run: |
          # Directory layout on runner:
          #   /home/runner/work/MyClaw/             <- GitHub workspace root (GITHUB_WORKSPACE)
          #   /home/runner/work/MyClaw/zeroclaw/    <- zeroclaw repo (src/crates/...)
          #   /home/runner/work/MyClaw/MyClaw/     <- default Actions workspace (where we're running from)
          #   /home/runner/work/MyClaw/MyClaw/myclaw/ <- MyClaw workspace root
          #
          # MyClaw's workspace root (myclaw/Cargo.toml):
          #   zeroclaw-api = { path = "../../src/crates/zeroclaw-api" }
          # From myclaw/, goes to /home/runner/work/MyClaw/MyClaw/src/crates/ (WRONG)
          # Correct: ../../zeroclaw/src/crates/ → /home/runner/work/MyClaw/zeroclaw/src/crates/ ✓
          #
          # Member crates (infrastructure/zeroclaw-registry/, etc.):
          #   zeroclaw-api = { path = "/home/ubuntu/.zeroclaw/src/crates/zeroclaw-api" }
          # From infrastructure/zeroclaw-registry/:
          #   ../zeroclaw/src/crates/ → /home/runner/work/MyClaw/MyClaw/zeroclaw/src/crates/ (WRONG)
          # Correct: ../../zeroclaw/src/crates/ → /home/runner/work/MyClaw/zeroclaw/src/crates/ ✓
          #
          # Actually ALL zeroclaw-* path deps in MyClaw should point to
          # /home/runner/work/MyClaw/zeroclaw/src/crates/xxx
          # From myclaw/: ../../zeroclaw/src/crates/xxx
          # From infrastructure/zeroclaw-registry/: ../../../zeroclaw/src/crates/xxx
          # The cleanest approach: use an absolute path via $GITHUB_WORKSPACE

          cd myclaw

          # Use the GitHub workspace root to construct the correct path.
          # $GITHUB_WORKSPACE = /home/runner/work/MyClaw/MyClaw
          # zeroclaw is at $GITHUB_WORKSPACE/../zeroclaw/ = /home/runner/work/MyClaw/zeroclaw/
          ZEROCLAW_PATH="$GITHUB_WORKSPACE/../zeroclaw"

          # Fix all zeroclaw path deps to use the correct relative path.
          # For workspace root (myclaw/Cargo.toml): ../../zeroclaw/src/crates/xxx
          # For member crates: ../../zeroclaw/src/crates/xxx (same, because
          # from myclaw/infrastructure/zeroclaw-registry/,
          # ../../zeroclaw → myclaw/../../zeroclaw → /home/runner/work/MyClaw/zeroclaw/ ✓)
          find . -name "Cargo.toml" -exec sed -i \
            -e "s|path = \"/home/ubuntu/.zeroclaw/src/crates/\\([^ ]*\\)\"|path = \"../../zeroclaw/src/crates/\\1\"|g" \
            -e "s|path = \"../../src/crates/\\([^ ]*\\)\"|path = \"../../zeroclaw/src/crates/\\1\"|g" \
            {} \;

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: cargo-registry-${{ hashFiles('**/Cargo.toml') }}

      - name: Cache cargo git
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: cargo-git-${{ hashFiles('**/Cargo.toml') }}

      - name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: target
          key: cargo-build-${{ hashFiles('**/Cargo.toml') }}

      - name: Build all workspace crates
        run: cargo build --workspace
        working-directory: myclaw

      - name: Run clippy on active crates
        run: cargo clippy --workspace -- -D warnings
        working-directory: myclaw

      - name: Run tests on active crates
        run: cargo test -p zeroclaw-registry
        working-directory: myclaw