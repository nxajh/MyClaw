name: Build

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout zeroclaw (full repo)
        uses: actions/checkout@v4
        with:
          repository: nxajh/zeroclaw
          path: zeroclaw
          fetch-depth: 1

      - name: Checkout MyClaw
        uses: actions/checkout@v4
        with:
          path: myclaw
          fetch-depth: 0

      - name: Fix path deps in MyClaw workspace
        run: |
          # Directory layout on runner:
          #   /home/runner/work/MyClaw/             <- runner workspace root (GITHUB_WORKSPACE)
          #   /home/runner/work/MyClaw/zeroclaw/     <- zeroclaw repo (src/crates/...)
          #   /home/runner/work/MyClaw/MyClaw/      <- default GitHub Actions workspace
          #   /home/runner/work/MyClaw/MyClaw/myclaw/ <- MyClaw workspace root
          #
          # Problem: all zeroclaw path deps in MyClaw Cargo.toml files use
          # /home/ubuntu/.zeroclaw/src/crates/xxx (local dev) or
          # ../../src/crates/xxx (relative to MyClaw, which is wrong on the runner).
          #
          # Fix: replace all of them with ../zeroclaw/src/crates/xxx
          # This is relative to the MyClaw workspace root (myclaw/) and works from
          # both workspace root and member crate level.
          #
          # From myclaw/infrastructure/zeroclaw-registry/:
          #   ../zeroclaw/src/crates/zeroclaw-api → myclaw/../zeroclaw/src/crates/ = zeroclaw/src/crates/ ✓

          cd myclaw

          # Fix all zeroclaw path deps to ../zeroclaw/src/crates/xxx
          find . -name "Cargo.toml" -exec sed -i \
            -e 's|path = "/home/ubuntu/.zeroclaw/src/crates/\([^"]*\)"|path = "../zeroclaw/src/crates/\1"|g' \
            -e 's|path = "../../src/crates/\([^"]*\)"|path = "../zeroclaw/src/crates/\1"|g' \
            {} \;

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: cargo-registry-${{ hashFiles('**/Cargo.toml') }}

      - name: Cache cargo git
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: cargo-git-${{ hashFiles('**/Cargo.toml') }}

      - name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: target
          key: cargo-build-${{ hashFiles('**/Cargo.toml') }}

      - name: Build all workspace crates
        run: cargo build --workspace
        working-directory: myclaw

      - name: Run clippy on active crates
        run: cargo clippy --workspace -- -D warnings
        working-directory: myclaw

      - name: Run tests on active crates
        run: cargo test -p zeroclaw-registry
        working-directory: myclaw